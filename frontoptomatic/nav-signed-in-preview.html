<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optomatic — Nav (signed-in) 9 states</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components/nav.css" />

  <style>
    /* 미리보기 전용 스타일 (실제 컴포넌트와 무관, 이 페이지에서만 사용) */
    body { background: #e9ecf2; padding: 40px 16px; }
    .preview { max-width: 1440px; margin: 0 auto; }
    .preview__title { font-family: var(--font-latin); font-size: 24px; font-weight: 700; color: #1a1b1b; margin-bottom: 4px; }
    .preview__note  { font-family: var(--font-latin); font-size: 14px; color: #5b5d62; margin-bottom: 32px; }
    .preview__item  { margin-bottom: 28px; }
    .preview__label { font-family: var(--font-latin); font-size: 13px; font-weight: 600; color: #5b5d62; margin-bottom: 6px; }
    .preview__label code { color: #4428ff; }
    /* 각 nav 를 카드처럼 흰 배경 위에 올려 경계 확인 */
    .preview__frame { background: #fbfdff; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
  </style>
</head>
<body>
  <div class="preview">
    <h1 class="preview__title">Nav bar — signed in (9 states)</h1>
    <p class="preview__note">
      Figma "sign in=yes, notifications=yes" 변형 9종. select 1 = 활성 메뉴(없음/Light Find/Light Design),
      select 2 = 우측 아이콘 선택(없음/알림/프로필). 모두 알림 배지(빨간 점) 표시.
    </p>
    <div id="preview-list"></div>
  </div>

  <!-- 컴포넌트 템플릿: components/nav-signed-in.html 과 동일 마크업.
       (미리보기에서 9번 복제 → 중복 id 방지를 위해 클론에서 id/aria-controls 제거) -->
  <template id="nav-tpl">
    <header class="nav" lang="en">
      <div class="nav__inner">
        <div class="nav__left">
          <a class="nav__logo" href="/" aria-label="Optomatic — home">
            <img src="assets/logo-optomatic-horizontal.svg" alt="Optomatic" width="162" height="36" />
          </a>
          <nav class="nav__menu" aria-label="Primary">
            <a class="nav__menu-link" href="#" data-menu="lightFind">Light Find</a>
            <a class="nav__menu-link" href="#" data-menu="lightDesign">Light Design</a>
          </nav>
        </div>
        <div class="nav__right">
          <div class="nav__lang-wrap">
            <button type="button" class="nav__lang" aria-haspopup="true" aria-expanded="false" aria-label="Change language, current: English">
              <span class="nav__lang-current">EN</span>
            </button>
          </div>

          <button type="button" class="nav__icon-btn has-unread" data-account-icon="notifications" aria-pressed="false" aria-label="Notifications, unread">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="currentColor" />
            </svg>
            <span class="nav__icon-dot" aria-hidden="true"></span>
          </button>

          <button type="button" class="nav__icon-btn" data-account-icon="profile" aria-pressed="false" aria-label="Account">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="currentColor" />
            </svg>
          </button>
        </div>
      </div>
    </header>
  </template>

  <script>
    // 9개 상태 정의 (사용자가 준 Figma node 순서)
    var STATES = [
      { node: "6050-13323", select1: null,          select2: null,            label: "기본 (메뉴 비활성 · 아이콘 비활성)" },
      { node: "6050-13363", select1: null,          select2: "notifications",  label: "알림 선택" },
      { node: "6050-13343", select1: null,          select2: "profile",        label: "프로필 선택" },
      { node: "6050-13203", select1: "lightFind",   select2: null,            label: "Light Find 활성" },
      { node: "6050-13243", select1: "lightFind",   select2: "notifications",  label: "Light Find 활성 · 알림 선택" },
      { node: "6050-13223", select1: "lightFind",   select2: "profile",        label: "Light Find 활성 · 프로필 선택" },
      { node: "6050-13263", select1: "lightDesign", select2: null,            label: "Light Design 활성" },
      { node: "6050-13303", select1: "lightDesign", select2: "notifications",  label: "Light Design 활성 · 알림 선택" },
      { node: "6050-13283", select1: "lightDesign", select2: "profile",        label: "Light Design 활성 · 프로필 선택" }
    ];

    var tpl = document.getElementById("nav-tpl");
    var list = document.getElementById("preview-list");

    STATES.forEach(function (s) {
      var node = tpl.content.cloneNode(true);
      var header = node.querySelector(".nav");

      // select 1 — 활성 메뉴 링크에 aria-current="page" (파란 배경)
      if (s.select1) {
        var link = header.querySelector('.nav__menu-link[data-menu="' + s.select1 + '"]');
        if (link) link.setAttribute("aria-current", "page");
      }
      // select 2 — 선택된 아이콘에 aria-pressed="true" (검정)
      if (s.select2) {
        var icon = header.querySelector('.nav__icon-btn[data-account-icon="' + s.select2 + '"]');
        if (icon) icon.setAttribute("aria-pressed", "true");
      }

      var item = document.createElement("div");
      item.className = "preview__item";
      var lbl = document.createElement("div");
      lbl.className = "preview__label";
      lbl.innerHTML = s.label + ' &nbsp;<code>' + s.node + '</code>';
      var frame = document.createElement("div");
      frame.className = "preview__frame";
      frame.appendChild(header);

      item.appendChild(lbl);
      item.appendChild(frame);
      list.appendChild(item);
    });
  </script>
</body>
</html>

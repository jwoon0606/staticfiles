<!-- ============================================================================
     nav.html — Optomatic 상단 내비게이션 바
     Figma: nav_bar_desktop (node 6661:10502) / nav_bar_mobile (node 6050:16603)
            (Optomatic_NEW_260601)

     사용법:
       <head>에 토큰/타이포 CSS를 먼저 불러온 뒤 nav.css 를 불러옵니다.
         <link rel="stylesheet" href="css/variables.css">
         <link rel="stylesheet" href="css/reset.css">
         <link rel="stylesheet" href="css/typography.css">
         <link rel="stylesheet" href="css/layout.css">
         <link rel="stylesheet" href="css/components/nav.css">
       <body> 끝에:
         <script src="js/nav.js" defer></script>

     다국어(i18n): 교체 대상 텍스트에 data-i18n="키" 가 붙어 있습니다.
       한글 버전은 <header> 의 lang 을 "ko" 로 바꾸고 문자열만 갈아끼우면 됩니다.

     반응형: 1024px 미만에서 메뉴 링크·EN 박스가 숨겨지고 햄버거로 토글됩니다.
       (햄버거 펼침 패널 디자인은 Figma에 없어 합리적 기본값으로 구현 — nav.css 주석 참고)
============================================================================ -->
<header class="nav" lang="en">
  <div class="nav__inner">
    <!-- 왼쪽: 로고 + 메뉴 -->
    <div class="nav__left">
      <a class="nav__logo" href="/" aria-label="Optomatic — home">
        <img src="assets/logo-optomatic-horizontal.svg" alt="Optomatic" width="162" height="36" />
      </a>

      <!-- 메뉴 (데스크톱: 가로 링크 / 모바일: 햄버거 풀스크린 패널, 기본 닫힘)
           Sign in·EN 은 모바일 패널 전용(.nav__menu-link--mobile): 데스크톱 메뉴엔 숨김 -->
      <nav class="nav__menu" id="nav-menu" aria-label="Primary" hidden>
        <a class="nav__menu-link" href="#" data-i18n="nav.lightFind">Light Find</a>
        <a class="nav__menu-link" href="/light-design" data-i18n="nav.lightDesign">Light Design</a>
        <a class="nav__menu-link nav__menu-link--mobile" href="/login" data-i18n="nav.signIn2" data-auth="out">Sign in</a>
        <button type="button" class="nav__menu-lang nav__menu-link--mobile" aria-label="Change language, current: English">
          <span data-i18n="nav.lang">EN</span>
        </button>
      </nav>
    </div>

    <!-- 오른쪽: 언어 · 로그인 · 햄버거 -->
    <div class="nav__right">
      <!-- 언어 토글 + 드롭다운 (데스크톱 전용; 모바일에서는 숨김) -->
      <div class="nav__lang-wrap">
        <button
          type="button"
          class="nav__lang"
          data-nav-toggle
          aria-haspopup="true"
          aria-controls="nav-lang-menu"
          aria-expanded="false"
          aria-label="Change language, current: English"
        >
          <span class="nav__lang-current" data-i18n="nav.lang">EN</span>
        </button>

        <ul class="nav__lang-menu" id="nav-lang-menu" role="menu" hidden>
          <li role="none">
            <button type="button" class="nav__lang-option" role="menuitem" data-lang="en" data-lang-label="EN" aria-current="true">
              <img class="nav__lang-flag" src="assets/flag-en.svg" alt="" width="20" height="20" />
              <span data-i18n="nav.langOption.en">EN - English</span>
            </button>
          </li>
          <li role="none">
            <button type="button" class="nav__lang-option" role="menuitem" data-lang="kr" data-lang-label="KR" aria-current="false">
              <img class="nav__lang-flag" src="assets/flag-kr.svg" alt="" width="20" height="20" />
              <span data-i18n="nav.langOption.kr">KR - 한국어</span>
            </button>
          </li>
        </ul>
      </div>

      <a class="nav__signin" href="/login" data-i18n="nav.signIn" data-auth="out">SIGN IN</a>

      <!-- 로그인 상태 전용: 알림 벨 + 프로필 (auth.js 가 표시 제어) -->
      <button
        type="button"
        class="nav__icon-btn"
        data-account-icon="notifications"
        data-auth="in"
        style="display: none"
        aria-pressed="false"
        aria-label="Notifications"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="currentColor" />
        </svg>
      </button>

      <button
        type="button"
        class="nav__icon-btn"
        data-account-icon="profile"
        data-auth="in"
        style="display: none"
        aria-pressed="false"
        aria-label="Account"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="currentColor" />
        </svg>
      </button>

      <!-- 햄버거(dehaze) — 모바일 전용. 동작은 js/nav.js -->
      <button
        type="button"
        class="nav__toggle"
        data-nav-toggle
        aria-controls="nav-menu"
        aria-expanded="false"
        aria-label="Open menu"
        data-label-open="Open menu"
        data-label-close="Close menu"
      >
        <!-- 닫힘: 햄버거(dehaze) -->
        <svg class="nav__toggle-icon nav__toggle-icon--open" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M3 7V5H21V7H3ZM3 19V17H21V19H3ZM3 13V11H21V13H3Z" fill="currentColor" />
        </svg>
        <!-- 열림: X(close) -->
        <svg class="nav__toggle-icon nav__toggle-icon--close" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M6.4 19L5 17.6L10.6 12L5 6.4L6.4 5L12 10.6L17.6 5L19 6.4L13.4 12L19 17.6L17.6 19L12 13.4L6.4 19Z" fill="currentColor" />
        </svg>
      </button>
    </div>
  </div>
</header>
